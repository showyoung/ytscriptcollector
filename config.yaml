# YouTube 采集器配置文件
# 格式: YAML
# 路径搜索: 相对于本文件所在目录（不适用于 URL）

# ============================================================================
# yt-dlp 画质格式串（key = CLI 画质名，value = yt-dlp format string）
# ============================================================================
ytdlp_quality:
  audio:  "bestaudio/best"
  144p:   "bestvideo[height<=144]+bestaudio/best[height<=144]/best"
  240p:   "bestvideo[height<=240]+bestaudio/best[height<=240]/best"
  360p:   "bestvideo[height<=360]+bestaudio/best[height<=360]/best"
  480p:   "bestvideo[height<=480]+bestaudio/best[height<=480]/best"
  720p:   "bestvideo[height<=720]+bestaudio/best[height<=720]/best"
  1080p:  "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best"
  1440p:  "bestvideo[height<=1440]+bestaudio/best[height<=1440]/best"
  2160p:  "bestvideo[height<=2160]+bestaudio/best[height<=2160]/best"
  3840p:  "bestvideo[height<=3840]+bestaudio/best[height<=3840]/best"
  4320p:  "bestvideo[height<=4320]+bestaudio/best[height<=4320]/best"
  best:   "bestvideo+bestaudio/best"

# ============================================================================
# 浏览器 Cookie 自动检测顺序
# ============================================================================
browsers:
  - chrome
  - firefox
  - edge
  - brave
  - opera
  - chromium

# ============================================================================
# 下载媒体模型
# ============================================================================
media_type:
  - video
  - audio

# ============================================================================
# 下载音频模型
# ============================================================================
audio_format:
  - mp3
  - wav

# ============================================================================
# Whisper 模型
# ============================================================================
whisper_model:
  - tiny
  - base
  - small
  - medium
  - large

# ============================================================================
# YouTube 字幕语言列表（按优先级排序）
# ============================================================================
subtitle_languages:
  - all
  - zh
  - en
  - de
  - ja
  - fr
  - ko
  - es
  - hi
  - pt
  - ar
  - nb
  - da
  - sv
  - nl
  - ru
  - vi
  - id

# ============================================================================
# 默认值
# ============================================================================
defaults:
  media_type:       video    # video / audio
  quality:          360p    #   144p / 240p/ 360p/ 480p/ 720p/ 1080p/ 1440p/ 2160p/ 4320p/ best
  code_convert:     false    # false / true
  srt:             true     # false / true
  md:              true     # false / true
  whisper_model:    tiny     # tiny / base / small / medium / large
  whisper_language:  zh        # Whisper 转录语言
  separate_audio:  false    # false / true
  audio_format:     mp3      # mp3 / wav
  cookies_method:   auto     # auto / chrome / firefox / edge / brave / opera / chromium
  cookies_fallback: chrome    # auto 检测失败后使用的浏览器
  output_dir:       "~"     # ~ 表示软件目录下的 downloads/

# ============================================================================
# Web UI
# ============================================================================
web_ui:
  port:           8765       # Web UI 监听端口
  timeout_seconds: 3600      # 采集超时（秒），0 表示不超时
